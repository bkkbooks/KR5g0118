body:
  text: 丹法叅同三十對偶子清濁盈虧衰旺存亡有無吉凶悔吝生剋刑德動靜進退消長賔主沉浮升降老嫩文武剛柔離合聚散徃來上下雌雄黑白守戰生殺剥復深淺抽添寒暑丹法叅同二十貫穿子在天爲日月星辰在地爲山河草木在人爲夫婦男女在易爲乾坤坎離在象爲龍虎烏兔在數爲九三二八在藥爲鉛銀砂汞在醫爲燥濕寒温在内爲經絡榮衛在外爲皮膚毛血在形爲心腎肝肺在時爲隂陽寒暑在運爲金木水火在用爲精神魂魄在道爲隱顯動靜在物爲壇爐鼎室在妙爲虛無自然在方爲東西南北在色爲青紅黑白在景爲春夏秋冬攢簇五行之圖和合四象之圖偃月爐之圖三點如星現横鈎似月斜仙化圖此圖論藥物老君曰後其身而身先忘其身而身存第一轉金丹謂之一返謂之一還如糞壤中有蟲名曰蜣蜋用鉛不用鉛須向鉛中作第二轉金丹謂之二返謂之二還如蜣蜋採糞成丸子玄珠成象太乙歸眞第三轉金丹謂之三返謂之三還如蜣蜋有兩個一雌一雄夫婦老相逢思情自留戀第四轉金丹謂之四返謂之四還如蜣蜋共衮糞丸從地上行周天火候自在河車第五轉金丹謂之五返謂之五還如兩个蜣蜋共抱糞丸守而精思養正特盈守雌抱一第六轉金丹謂之六返謂之六還如糞丸之中有蝡白者精神聚會結成聖胎第七轉金丹謂之七返還丹謂之七還如糞丸中蝡白已成蟬形其中有精杳杳㝠㝠其中有物恍恍惚惚第八轉金丹謂之八還如蟬形已棄其糞丸之殻節候既周脫胎神化第九轉金丹謂之九還如蜣蜋死糞丸裂其蟬飛形神俱妙天機圖此圖論火候老君曰綿綿若存用之不勤十一月第一轉火候如桃核入土取將坎位中心實點破離宫腹裏隂十二月第二轉火候如桃核生芽無質生質是還丹誰信無中養就兒正月第三轉火候如桃核抽條白雪黄芽纔過了一爐猛火煅紅桃二月此一月屬卯木旺在卯防危慮險沐浴丹頭三月第四轉火候如桃條發英一霎火焰飛眞人自出現四月第五轉火候如桃條敷葉牽將白虎歸來養産个明珠似月圓五月第六轉火候如桃樹生花到此丹砂須沐浴抽添運用更防危六月第七轉火候如桃花已落花蒂留其萼飲刀圭服丹砂七月第八轉火候如桃花之萼結子鷄卵中黄龍珠内白八月此一月屬酉金旺在酉只宜養火不可放逸沐浴九月第九轉火候如桃實紅熟十月霜飛丹始熟十月胎圓超凡入聖十月十月脫胎吞入腹始知我命不由天心有九竅謂之金鼎黄帝鑄九鼎者此也金丹之圖形如彈丸色同朱橘神室之圖離種種邊壺中有天玄之又玄入眾妙門嬰兒之圖兩箇一般無二樣始知功滿岀塵埃刀圭之圖飲刀圭者三花聚頂味道之腴五氣朝元玄牝之圖玄牝之門是謂天地根三關之圖忘形忘氣忘神養氣養神養虛産藥川源之圖藥在西南是本郷蟾光終日照西川藥物火候圖是火火屬心心爲汞是藥藥屬身身爲鉛性命之圖神是性屬離坤之中隂氣是命屬坎乾之中陽眞土之圖黄房黄婆戊己黄庭土釜是丹法叅同七鑑華池心源性海謂之華池神水性猶水也謂之神水黄芽心地開花謂之黄芽白雪虛室生白謂之白雪河車一氣周流謂之河車巽風巽者順也順調其心金丹清凈光明圓通廣大丹法叅同十九訣一採藥收拾身心歛藏神氣二結丹凝氣聚神念念不動三烹鍊玉符保神金液鍊形四固濟忘形絶念謂之固濟五武火奮迅精神驅除雜念六文火專氣致柔含光默默温温不絶綿綿若存七沐浴洗心滌慮謂之沐浴八丹砂有無交入隱顯相符九過關果生枝上終期熟子在胞中豈有殊十分胎雞能抱卵心常聽蟬到成形殻自分十一温養知白守黑神明自來十二防危一念外馳火候差失十三工夫朝收暮採日鍊時烹十四交媾念念相續同成一片十五大還對景無心晝夜如一十六聖胎蟄其神於外藏其氣於内十七九轉火候足時嬰兒自現十八换鼎子又生孫千百億化十九太極形神俱妙與道合直老君曰道非欲虛虛自歸之人能虛心道自歸之天地交乾之圖晦朔天地交鉛見癸生須急採金逢望遠不堪嘗日月合璧之圖望十五日亥十六日子日月合金丹火候口訣古云聖人傳藥不傳火此金丹捷徑備言丹法細微之㫖矣終不敢明說火候夫火候者乃奪天地之氣盜日月之精不敢輕世夙有仙骨自然有分造物圖磁石吸鐵如鷄抱卵煖炁不絶隔礙潜通如龍養珠不令間斷龜龜相顧以神交蛤蚌採月養成眀珠鶴鶴相唳以氣交秋兔見月遂有兔胎如石稟秀結成美玉李廣射石如松凌霜抱其正氣出乎不知鑿石得玉硫黄與水淘沙得金可以共處物以類聚蠮螉呪子水不洗水傳精送神老君曰專氣致柔能如嬰兒常德不離歸於嬰兒龍虎圖身是虎歛身束䰟充虎饑虎來食噉生髓脂受氣心是龍凝心息念任龍蟠龍蟠潭裏珠光寒鍊神金液還丹圖金液還丹白玉蟾曰虛無自然無中生有萬物一物一貴乎守回風混合終日如酒大夢得醒雷轟電走雲收雨散天長地久仙派正陽眞君純陽眞君海蟾眞君紫陽眞人杏林眞人道光眞人泥丸眞人玉蟾眞人鉤鎖連環經太乙元君曰金丹即是汞汞即是鉛鉛即銀銀即砂砂即金金即錫錫即水銀水銀即青金青金即白金白金即黑金黑金即黄金黄金即紫金紫金即河車河車即黄芽黄芽即白雪白雪即玉符玉符即神水神水即華池華池即青龍青龍即白虎白虎即朱雀朱雀即玄武玄武即勾陳勾陳即黄房黄房即眞土眞土即戊己戊己即金木金木即水火水火即卯酉卯酉即兔鷄兎鷄即烏兎烏兎即龜蛇龜蛇即馬牛馬牛即乾坤乾坤即坎離坎離即雌雄雌雄即夫婦夫婦即子孫子孫即房畢房畢即日月日月即天地天地即人人即黄婆黄婆即金公金公即姹女姹女即嬰兒嬰兒即丁公丁公即赤子赤子即聖胎聖胎即三關三關即金液金液即玉液玉液即刀圭刀圭即丹田丹田即絳宫絳宫即泥丸泥丸即氣海氣海即腎腎即心心即道道即法法即術術即虛無虛無即自然自然即運用運用即火火即藥藥即氣氣即神神即丹頭丹頭即大還大丹即七返七返即九還九還即金火金火即紫芝紫芝即水源水源即土釜土釜即金鼎金鼎即玉爐玉爐即神室神室即元壇元壇即黄庭黄庭即眼眼即鼻鼻即耳耳即松松即蜣蜋蜣蜋即桃桃即朱橘朱橘即六賊六賊即三尸三尸即三魂三魂即七魄七魄即五神五神即萬神萬神即一神一神即萬寳萬寳即沐浴沐浴即抽添抽添即進退進退即文武文武即斤兩斤兩即吉凶吉凶即刑德刑德即存亡存亡即黑白黑白即有無有無即始終始終即動靜動靜即寒暑寒暑即隂陽隂陽即冬至冬至即夏至夏至即望望即朔朔即弦弦即晦晦即潮候潮候即月輪月輪即日華日華即太一太一即玄珠玄珠即四象四象即五行五行即八卦八卦即三才三才即三光三光即兩儀兩儀即太極太極即太上太上即混元混元即無始無始即無終無終即元始元始即一氣一氣即虛空虛空即虛无虛无即混沌混沌即金丹老君曰得其一萬事畢畢其萬一事辦張紫陽曰鉤鎖連環相續不斷道無終始流轉無窮惟人最靈以心契道道在天地天地不知道在萬物萬物不知故得道者身即天地天即地地即天天即道道而天地天地即身身即心心即神陳泥丸云古仙上聖口口相傳不立文字吾今於世書而録之上士得之心同太虛中士得之身同枯木下士得之身心營營關尹子曰賢人執於内衆人執於外聖人皆僞之白玉蟾曰得悟之者可傳聖道無悟無得悟者自得得悟聖道無古無今其去非古其來非今所可傳者只謂之事不謂之道道本無傳道無聲色道無相貌道無古今道無徃來道光和尚曰行之一年聖胎成行之二年嬰兒靈行之三年身外身行之四年子生孫行至九年可飛昇功行未備或聚散聚則成形散則風子但片餉見玄珠玄珠即是混元精日鍊時烹火温温保爾身同天地存劉海蟾曰勤而不遇終遇聖師遇而不勤終爲下鬼吕眞人曰輕泄漏慢殃及九祖修鍊行持身登太微鍾離雲房曰輕輕捲默默收灌沐怡怡兮衮衮道德經云綿綿若存專氣致柔猶於嬰兒常德不離復歸於嬰兒快活歌贈道士陳知白快活快活眞快活被我一時都掉脫撒手浩歌歸去來生薑胡椒果是辣如今快活大快活有時放顚或放劣自家身裏有夫妻說向時人須笑殺向時快活小快活無影樹子和根拔男兒端的會懷胎子母同形活潑潑快活快活眞快活虛空粉碎秋毫末輪迴生死幾千生這回大死今方活舊時窠臼潑生混于今淨盡都掉脫元來爹爹只是爺懵懵懂懂自瓜葛近來髣髴辨東西七七依前四十八如龍養珠心不忘如鷄抱卵氣不絶又似寒蟬吸曉風又如老蚌舍秋月一箇閑人天地間大笑一聲天地闊衣則四時惟一衲飯則千家可一鉢三家村裏弄風狂十字街頭打鶻突一夫一妻將六兒或行或坐常兀兀收來放去任縱横即是十方三世佛有酒一杯復一杯有歌一闋又一闋日中了了飽三餐飯後齁齁睡一歇放下萬緣都掉脫脫得自如方快活用盡惺惺學得癡此則化景登晨訣時人不會翻筋斗如飢喫鹽加得渴偶然放浪到廬山身在白蘋紅蓼間一登天籟亭前望黄鶴未歸春雨寒心酸世上幾多人不鍊金液大還丹忘形養氣乃金液對景無心是大還忘形化氣氣化神斯乃大道透三關絳宫炎炎偃月爐靈臺寂寂太玄壇朱砂乃是赤鳳血水銀乃是黑龜肝金鉛採歸入土釜木汞飛走居泥丸華池政在氣海内神室政在黄庭間散則眼耳鼻舌忙聚則經絡榮衛閑五臟六腑各有神萬神朝元歸一靈一靈是謂混元精先天後天乾元亨聖人探此爲藥材聚之則有散則零晝夜河車不蹔停默契大造同運行人人本有一滴金金精木液各半斤二十八宿歸一爐一水一火須調匀一候剛兮一候柔一爻武兮一爻文心天節候定寒暑性地分野分楚秦一日八萬四千里自有斗柄周天輪人將蛻殻隂陽外不可不鍊水銀銀但得黄婆來紫庭金翁姹女即婚姻青龍白虎繞金鼎黄芽半夜一枝春九曲江頭飛白雪崑崙山巔騰紫雲丁公默默守玉爐交媾温養成胎嬰神水沃滅三尸火慧劒掃除六賊兵無中生有一刀圭糞丸中有蜣蜋形誠哉一得即永得片餉中間可結成忽然四大生虛白不覺一靈升太清縱使功夫汞見鉛不知火候也徒然大都要藉周天火十月聖胎方始圓雖結丹頭終耗失要須火候始凝堅動靜存亡宜沐浴吉凶進退貴抽添火力綿綿九轉後藥物始可成胎仙一時八刻一周天十二時辰準一年每自一陽交遘後功夫鍊到六純乾精神來徃如潮候氣血盈虛似月魂一轂從來三十輻妙處都由前後弦專氣致桑爲至仁禮義智信融爲仁眞土歸位爲至眞水火金木俱渾全精水神火與意土鍊使魂魄歸其根先天一氣今常存散在萬物與人身花自春風鳥自啼豈知造物天爲春百姓日用而不知氣入四肢徒凋零松竹虛心受氣足凌霜傲雪長年青況人元神本不死此氣即是黄芽鉛老者可少病可健散者可聚促可延心入虛無行火候内景内象壼中天須知一塵一蓬萊與夫一葉一偓佺神即火兮氣即藥心爲爐兮身爲田自耕自種自烹鍊一日一粒如黍然靈芝一生甘露降龜蛇千古常相纏一朝雷電撼山川一之則日萬則煙日中自有金烏飛夜夜三更入廣寒子子孫孫千百億爐鼎鷄犬皆登天大道三十有二傳傳到天臺張悟眞四傳復至白玉蟾眼空四海嗟無人偶過太平興國宫白髮道士其姓陳半生立志學鉛汞萬水千山徒苦辛一朝邂逅廬山下擺手笑出人間塵翠閣對床風雨夜授以丹法使還元人生何似一杯酒人生何如一盞燈蓬萊方丈在何處青雲白鶴欲歸去快活快活眞快活爲君說此末後句末後句親分付普爲天下學仙者曉然指出蓬萊路海瓊傳道集
