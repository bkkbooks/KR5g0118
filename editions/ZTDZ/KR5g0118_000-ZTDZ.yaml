front:
  text: 海瓊傳道集序并六關尹子曰所可傳者只謂之事不謂之道老君曰吾不知其名强名曰道此集之行其與三千六百法養命數十家大故天淵矣凡我同志其精研之魯語有謂夫子之言性與天道不可得而聞也吁天下後世不審夫子之意即以爲甚高難行之事夫豈知夫子之門獨稱顔淵顔淵得之則三月不違仁而又終日如愚故其在陋巷甘以簞食瓢飲爲樂所以三十二歲而蛻去矣人能悟顔淵心齋之㫖則知神室之說既知神室則知神水孟子曰性猶水也其斯之謂乎悟眞篇云修生之要在乎金丹金丹之要在乎神水華池至簡至易雖愚暗小人行之立躋聖地道德經云吾道甚易知甚易行昔者鍾離雲房以此傳之吕洞賔吕傳之劉海蟾劉傳之張平叔張傳之石泰石傳之道光和尚道光傳之陳泥丸陳傳之白玉蟾則吾師也乙亥之秋遇之於武夷山越戊寅之春復於廬山相會過太平興國宫有道士洪知常字明道自號坎離子於内外二丹留意久矣千師萬友叅究已遍千經萬論搜括無蹤一旦與之因縁契合半句之下金篦刮膜片餉之間玄珠成象洪公將隱形遁跡杜門絶交坐進火候以圓聖胎恐此道無傳故以所得吾師金丹捷徑一篇鈎鎖連環經一卷及廬山快活歌一章刊行于世總而名之曰傳道集欲天下共之刀圭子陳守默紫芝子詹繼瑞稽首拜書傳道集
